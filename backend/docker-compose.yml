name: overload

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts "mlflow,mlflow:5000,localhost,localhost:5001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  prefect:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_UI_API_URL: http://localhost:4200/api
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://overload:overload@postgres:5432/overload
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overload -d overload"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: prefect worker start --pool default-agent-pool
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      prefect:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  mlflow_data:
  postgres_data:
